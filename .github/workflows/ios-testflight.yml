name: iOS -> TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run (bootstrap or beta)"
        required: true
        default: "bootstrap"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Ensure webDir exists (Capacitor needs ./out)
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body></body>
          </html>
          EOF

      - name: Capacitor sync (iOS)
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Ruby deps
        run: bundle install

      - name: Validate required secrets are present
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -euo pipefail
          req=(MATCH_GIT_TOKEN MATCH_GIT_URL MATCH_PASSWORD ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8)
          for v in "${req[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required secret: $v"
              exit 1
            fi
          done
          echo "All required secrets are set."

      - name: Configure git auth for match (x-access-token)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "Git insteadOf rules:"
          git config --global --get-regexp '^url\..*\.insteadof$' || true

      - name: DEBUG - show Fastlane config used by CI
        run: |
          set -euo pipefail
          echo "----- git status -----"
          git status --porcelain || true
          echo "----- fastlane/Fastfile -----"
          sed -n '1,200p' fastlane/Fastfile || true
          echo "----- fastlane/Matchfile -----"
          sed -n '1,200p' fastlane/Matchfile || true
          echo "----- workflow input lane -----"
          echo "${{ github.event.inputs.lane }}"

      - name: Run Fastlane
        env:
          # Match / signing
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

          # App Store Connect API key
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

          # Helpful to avoid any interactive prompts
          CI: "true"
        run: |
          set -euo pipefail
          bundle exec fastlane ios "${{ github.event.inputs.lane }}"