name: iOS -> TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run (bootstrap or beta)"
        required: true
        default: "bootstrap"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Ensure webDir exists
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body></body>
          </html>
          EOF
      - run: npx cap sync ios

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - run: bundle install

      - name: Configure git auth for match (x-access-token)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Configure git auth for match (x-access-token)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Reset git auth (remove any Basic headers) and force token
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          set -e
          # Remove any inherited extra headers that could force Basic auth
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.extraheader || true
          # Force token auth for all github.com HTTPS clones
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
          # Show relevant git config for debugging (safe)
          git config --global -l | grep -E "extraheader|insteadOf" || true

      - name: Run Fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: https://x-access-token:${{ secrets.MATCH_GIT_TOKEN }}@github.com/jackellismoore/pinch-my-pony-ios-signing.git
        run: bundle exec fastlane ios ${{ github.event.inputs.lane }}
