name: iOS -> TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run (bootstrap or beta)"
        required: true
        default: "bootstrap"

jobs:
  build:
    runs-on: macos-latest
    steps:
      # IMPORTANT: force checkout of main so you never run an old commit by accident
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ensure webDir exists
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body></body>
          </html>
          EOF

      - run: npx cap sync ios

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      # Match repo auth (GitHub token)
      - name: Configure git auth for match (x-access-token)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          set -e
          if [ -z "$MATCH_GIT_TOKEN" ]; then
            echo "MATCH_GIT_TOKEN is EMPTY (secret name mismatch)."
            exit 1
          fi
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "Git insteadOf rules:"
          git config --global --get-regexp '^url\..*\.insteadof$' || true

      # ✅ DEBUG: prove what code the runner is actually using
      - name: DEBUG - show git + fastlane files
        run: |
          set -e
          echo "===== git ====="
          git rev-parse HEAD
          git log -1 --oneline

          echo "===== fastlane/Fastfile ====="
          sed -n '1,200p' fastlane/Fastfile || true

          echo "===== fastlane/Matchfile ====="
          sed -n '1,200p' fastlane/Matchfile || true

          echo "===== workflow input lane ====="
          echo "${{ github.event.inputs.lane }}"

      - name: Run Fastlane
        env:
          CI: "true"
          FASTLANE_SKIP_UPDATE_CHECK: "true"
          FASTLANE_DISABLE_COLORS: "1"

          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: bundle exec fastlane ios ${{ github.event.inputs.lane }}