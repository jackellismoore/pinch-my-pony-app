name: ios-testflight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
      FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
      FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}

      IOS_SCHEME: App
      APPLE_TEAM_ID: MBYRMXKNM4
      APP_BUNDLE_ID: com.pinchmypony.app

      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_IDENTITY_WEBHOOK_SECRET: ${{ secrets.STRIPE_IDENTITY_WEBHOOK_SECRET }}

      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
      CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}

      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}

      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Patch Capacitor Swift package binaries only
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p ios/App/capacitor-swift-pm
          cat > ios/App/capacitor-swift-pm/Package.swift <<'EOF'
          // swift-tools-version:5.9
          import PackageDescription

          let package = Package(
              name: "capacitor-swift-pm",
              platforms: [
                  .iOS(.v14)
              ],
              products: [
                  .library(name: "Capacitor", targets: ["Capacitor"]),
                  .library(name: "Cordova", targets: ["Cordova"])
              ],
              targets: [
                  .binaryTarget(
                      name: "Capacitor",
                      path: "Frameworks/Capacitor.xcframework"
                  ),
                  .binaryTarget(
                      name: "Cordova",
                      path: "Frameworks/Cordova.xcframework"
                  )
              ]
          )
          EOF

      - name: Force CapApp-SPM to use local Capacitor package
        shell: bash
        run: |
          set -euxo pipefail

          FILE="ios/App/CapApp-SPM/Package.swift"

          echo "Before patch:"
          cat "$FILE"

          python3 <<'PY'
          from pathlib import Path
          file = Path("ios/App/CapApp-SPM/Package.swift")
          text = file.read_text()

          text = text.replace(
              '.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "8.0.0")',
              '.package(path: "../capacitor-swift-pm")'
          )
          text = text.replace(
              '.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "8.1.0")',
              '.package(path: "../capacitor-swift-pm")'
          )
          text = text.replace(
              '.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", exact: "8.0.0")',
              '.package(path: "../capacitor-swift-pm")'
          )
          text = text.replace(
              '.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", exact: "8.1.0")',
              '.package(path: "../capacitor-swift-pm")'
          )

          file.write_text(text)
          print(file.read_text())
          PY

      - name: Verify CapApp-SPM contains push plugin and local package path
        shell: bash
        run: |
          set -euxo pipefail
          cat ios/App/CapApp-SPM/Package.swift
          grep -q 'CapacitorPushNotifications' ios/App/CapApp-SPM/Package.swift
          grep -q '\.package(path: "../capacitor-swift-pm")' ios/App/CapApp-SPM/Package.swift
          ! grep -q 'https://github.com/ionic-team/capacitor-swift-pm.git' ios/App/CapApp-SPM/Package.swift

      - name: Download local Capacitor xcframeworks
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ios/App/capacitor-swift-pm/Frameworks
          mkdir -p ios/App/capacitor-swift-pm/Frameworks
          mkdir -p /tmp/pmp-capacitor-downloads

          curl -L \
            -o /tmp/pmp-capacitor-downloads/Capacitor.xcframework.zip \
            https://github.com/ionic-team/capacitor-swift-pm/releases/download/8.1.0/Capacitor.xcframework.zip

          curl -L \
            -o /tmp/pmp-capacitor-downloads/Cordova.xcframework.zip \
            https://github.com/ionic-team/capacitor-swift-pm/releases/download/8.1.0/Cordova.xcframework.zip

          unzip -q /tmp/pmp-capacitor-downloads/Capacitor.xcframework.zip -d ios/App/capacitor-swift-pm/Frameworks
          unzip -q /tmp/pmp-capacitor-downloads/Cordova.xcframework.zip -d ios/App/capacitor-swift-pm/Frameworks

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure git auth for match repo
        run: |
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Create & unlock CI keychain
        shell: bash
        run: |
          set -euxo pipefail
          KEYCHAIN_NAME=build.keychain-db
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "CI_KEYCHAIN_NAME=$KEYCHAIN_NAME" >> "$GITHUB_ENV"
          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CI_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install signing assets with match
        shell: bash
        run: |
          set -euxo pipefail
          bundle exec fastlane run match \
            type:appstore \
            readonly:true \
            force:false \
            git_url:"$MATCH_GIT_URL" \
            keychain_name:"$CI_KEYCHAIN_NAME" \
            keychain_password:"$CI_KEYCHAIN_PASSWORD" \
            app_identifier:"$APP_BUNDLE_ID"

      - name: Verify signing identity exists
        shell: bash
        run: |
          set -euxo pipefail

          security default-keychain -s "$CI_KEYCHAIN_PATH"
          security unlock-keychain -p "$CI_KEYCHAIN_PASSWORD" "$CI_KEYCHAIN_PATH"
          security list-keychains -d user -s "$CI_KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH"

          CERT_NAME=$(security find-identity -v -p codesigning "$CI_KEYCHAIN_PATH" \
            | sed -n 's/.*"\(Apple Distribution:.*\)"/\1/p' \
            | head -n 1)

          if [ -z "${CERT_NAME:-}" ]; then
            echo "No Apple Distribution certificate found in CI keychain"
            exit 1
          fi

          echo "EXPORT_CERT_NAME=$CERT_NAME" >> "$GITHUB_ENV"

      - name: Select correct provisioning profile for app bundle
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import os
          import glob
          import plistlib
          import subprocess
          import sys

          team_id = os.environ["APPLE_TEAM_ID"]
          bundle_id = os.environ["APP_BUNDLE_ID"]
          expected_app_id = f"{team_id}.{bundle_id}"

          profile_dirs = [
              os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles"),
              os.path.expanduser("~/Library/Developer/Xcode/UserData/Provisioning Profiles"),
          ]

          candidates = []
          for d in profile_dirs:
              if os.path.isdir(d):
                  candidates.extend(glob.glob(os.path.join(d, "*.mobileprovision")))

          if not candidates:
              print("No provisioning profiles found", file=sys.stderr)
              sys.exit(1)

          matches = []
          for path in candidates:
              try:
                  raw = subprocess.check_output(["/usr/bin/security", "cms", "-D", "-i", path])
                  plist = plistlib.loads(raw)
              except Exception:
                  continue

              ent = plist.get("Entitlements", {})
              app_id = ent.get("application-identifier", "")
              aps = ent.get("aps-environment", "")
              name = plist.get("Name", "")
              uuid = plist.get("UUID", "")

              if app_id != expected_app_id:
                  continue

              matches.append({
                  "path": path,
                  "name": name,
                  "uuid": uuid,
                  "aps": aps,
              })

          if not matches:
              print(f"No provisioning profile found for {expected_app_id}", file=sys.stderr)
              sys.exit(1)

          preferred = None
          for item in matches:
              if item["aps"] == "production":
                  preferred = item
                  break

          if preferred is None:
              preferred = matches[0]

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f'IOS_PROFILE_UUID={preferred["uuid"]}\n')
              f.write(f'IOS_PROFILE_NAME={preferred["name"]}\n')

          print("Selected profile:", preferred["name"], preferred["uuid"], preferred["aps"])
          PY

      - name: Archive app
        shell: bash
        run: |
          set -euxo pipefail

          (
            while true; do
              echo "heartbeat: archive still running at $(date)"
              sleep 30
            done
          ) &
          HEARTBEAT_PID=$!

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            -derivedDataPath ios/App/DerivedData \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$EXPORT_CERT_NAME" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            archive | tee xcodebuild-archive.log

          kill $HEARTBEAT_PID || true

      - name: Export IPA
        shell: bash
        run: |
          set -euxo pipefail

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$APP_BUNDLE_ID</key>
              <string>$IOS_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Upload to TestFlight
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p fastlane/private_keys
          printf '%s' "$ASC_KEY_P8" > fastlane/private_keys/AuthKey_$ASC_KEY_ID.p8

          xcrun altool \
            --upload-app \
            --type ios \
            --file build/export/App.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"