name: ios-testflight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      IOS_SCHEME: App
      APPLE_TEAM_ID: MBYRMXKNM4
      APP_BUNDLE_ID: com.pinchmypony.app
      APP_PROFILE_NAME: match AppStore com.pinchmypony.app

      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_IDENTITY_WEBHOOK_SECRET: ${{ secrets.STRIPE_IDENTITY_WEBHOOK_SECRET }}

      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
      CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}

      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}

      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure git auth for match repo
        run: |
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Create & unlock CI keychain
        shell: bash
        run: |
          set -euxo pipefail
          KEYCHAIN_NAME=build.keychain-db
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "CI_KEYCHAIN_NAME=$KEYCHAIN_NAME" >> "$GITHUB_ENV"
          echo "CI_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Install signing assets
        env:
          CI_KEYCHAIN_NAME: ${{ env.CI_KEYCHAIN_NAME }}
          CI_KEYCHAIN_PASSWORD: ${{ env.CI_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane match appstore --readonly

      - name: Bump iOS build number
        shell: bash
        run: |
          set -euxo pipefail
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9][0-9]*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import subprocess, sys

          cmd = [
              "xcodebuild",
              "-resolvePackageDependencies",
              "-project", "ios/App/App.xcodeproj",
              "-scheme", "App",
              "-clonedSourcePackagesDirPath", "ios/App/SourcePackages",
          ]

          try:
              result = subprocess.run(cmd, check=False, timeout=600)
              sys.exit(result.returncode)
          except subprocess.TimeoutExpired:
              print("Swift package resolution timed out after 600 seconds.", file=sys.stderr)
              sys.exit(124)
          PY

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf build
          mkdir -p build
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${APP_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive app
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import subprocess, sys

          cmd = [
              "xcodebuild",
              "-project", "ios/App/App.xcodeproj",
              "-scheme", "App",
              "-configuration", "Release",
              "-archivePath", "build/App.xcarchive",
              "-destination", "generic/platform=iOS",
              "-clonedSourcePackagesDirPath", "ios/App/SourcePackages",
              "-derivedDataPath", "ios/App/DerivedData",
              f"DEVELOPMENT_TEAM={\"MBYRMXKNM4\"}",
              f"PRODUCT_BUNDLE_IDENTIFIER={\"com.pinchmypony.app\"}",
              "CODE_SIGN_STYLE=Manual",
              "CODE_SIGN_IDENTITY=Apple Distribution",
              "PROVISIONING_PROFILE_SPECIFIER=match AppStore com.pinchmypony.app",
              "archive",
          ]

          with open("xcodebuild-archive.log", "w") as f:
              try:
                  proc = subprocess.Popen(
                      cmd,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      text=True,
                      bufsize=1,
                  )

                  assert proc.stdout is not None
                  try:
                      for line in proc.stdout:
                          print(line, end="")
                          f.write(line)
                      returncode = proc.wait(timeout=1800)
                  except subprocess.TimeoutExpired:
                      proc.kill()
                      print("\nArchive timed out after 1800 seconds.", file=sys.stderr)
                      sys.exit(124)

                  if returncode != 0:
                      print(f"\nxcodebuild exit code: {returncode}", file=sys.stderr)
                      sys.exit(returncode)

              except Exception as e:
                  print(f"\nArchive step failed: {e}", file=sys.stderr)
                  sys.exit(1)
          PY

      - name: Upload archive log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-archive-log
          path: xcodebuild-archive.log

      - name: Export IPA
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import subprocess, sys

          cmd = [
              "xcodebuild",
              "-exportArchive",
              "-archivePath", "build/App.xcarchive",
              "-exportPath", "build/export",
              "-exportOptionsPlist", "build/ExportOptions.plist",
          ]

          try:
              result = subprocess.run(cmd, check=False, timeout=600)
              sys.exit(result.returncode)
          except subprocess.TimeoutExpired:
              print("IPA export timed out after 600 seconds.", file=sys.stderr)
              sys.exit(124)
          PY

      - name: Validate IPA
        shell: bash
        run: |
          set -euxo pipefail
          xcrun altool \
            --validate-app \
            --type ios \
            --file build/export/App.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA
        shell: bash
        run: |
          set -euxo pipefail
          xcrun altool \
            --upload-app \
            --type ios \
            --file build/export/App.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"