name: iOS -> TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run (bootstrap or beta)"
        required: true
        default: "bootstrap"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ensure webDir exists
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body></body>
          </html>
          EOF

      - run: npx cap sync ios

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - run: bundle install

      - name: Configure git auth for match (x-access-token)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          set -e
          if [ -z "$MATCH_GIT_TOKEN" ]; then
            echo "MATCH_GIT_TOKEN is EMPTY (secret name mismatch)."
            exit 1
          fi
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "Git insteadOf rules:"
          git config --global --get-regexp '^url\..*\.insteadof$' || true

      - name: Run Fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: bundle exec fastlane ios ${{ github.event.inputs.lane }}
