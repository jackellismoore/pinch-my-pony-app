name: ios-testflight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      IOS_SCHEME: App
      APPLE_TEAM_ID: MBYRMXKNM4
      APP_BUNDLE_ID: com.pinchmypony.app
      APP_PROFILE_NAME: match AppStore com.pinchmypony.app

      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_IDENTITY_WEBHOOK_SECRET: ${{ secrets.STRIPE_IDENTITY_WEBHOOK_SECRET }}

      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
      CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}

      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}

      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Patch Capacitor Swift packages to local package
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p ios/App/capacitor-swift-pm
          cat > ios/App/capacitor-swift-pm/Package.swift <<'EOF'
          // swift-tools-version:5.3
          import PackageDescription

          let package = Package(
              name: "capacitor-swift-pm",
              products: [
                  .library(name: "Capacitor", targets: ["Capacitor"]),
                  .library(name: "Cordova", targets: ["Cordova"])
              ],
              targets: [
                  .binaryTarget(
                      name: "Capacitor",
                      path: "Frameworks/Capacitor.xcframework"
                  ),
                  .binaryTarget(
                      name: "Cordova",
                      path: "Frameworks/Cordova.xcframework"
                  )
              ]
          )
          EOF

          cat > ios/App/CapApp-SPM/Package.swift <<'EOF'
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "CapApp-SPM",
              platforms: [.iOS(.v15)],
              products: [
                  .library(name: "CapApp-SPM", targets: ["CapApp-SPM"])
              ],
              dependencies: [
                  .package(path: "../capacitor-swift-pm")
              ],
              targets: [
                  .target(
                      name: "CapApp-SPM",
                      dependencies: [
                          .product(name: "Capacitor", package: "capacitor-swift-pm"),
                          .product(name: "Cordova", package: "capacitor-swift-pm")
                      ]
                  )
              ]
          )
          EOF

      - name: Download local Capacitor xcframeworks
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf ios/App/capacitor-swift-pm/Frameworks
          mkdir -p ios/App/capacitor-swift-pm/Frameworks
          mkdir -p /tmp/pmp-capacitor-downloads

          curl -L \
            -o /tmp/pmp-capacitor-downloads/Capacitor.xcframework.zip \
            https://github.com/ionic-team/capacitor-swift-pm/releases/download/8.1.0/Capacitor.xcframework.zip

          curl -L \
            -o /tmp/pmp-capacitor-downloads/Cordova.xcframework.zip \
            https://github.com/ionic-team/capacitor-swift-pm/releases/download/8.1.0/Cordova.xcframework.zip

          unzip -q /tmp/pmp-capacitor-downloads/Capacitor.xcframework.zip -d ios/App/capacitor-swift-pm/Frameworks
          unzip -q /tmp/pmp-capacitor-downloads/Cordova.xcframework.zip -d ios/App/capacitor-swift-pm/Frameworks

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure git auth for match repo
        run: |
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Create & unlock CI keychain
        shell: bash
        run: |
          set -euxo pipefail
          KEYCHAIN_NAME=build.keychain-db
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "CI_KEYCHAIN_NAME=$KEYCHAIN_NAME" >> "$GITHUB_ENV"
          echo "CI_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Install signing assets
        env:
          CI_KEYCHAIN_NAME: ${{ env.CI_KEYCHAIN_NAME }}
          CI_KEYCHAIN_PASSWORD: ${{ env.CI_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane match appstore --readonly

      - name: Bump iOS build number
        shell: bash
        run: |
          set -euxo pipefail
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9][0-9]*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf build ios/App/DerivedData ios/App/SourcePackages
          mkdir -p build
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${APP_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive app
        shell: bash
        run: |
          set -euxo pipefail

          (
            while true; do
              echo "heartbeat: archive still running at $(date)"
              sleep 30
            done
          ) &
          HEARTBEAT_PID=$!

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            -derivedDataPath ios/App/DerivedData \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="$APP_PROFILE_NAME" \
            archive 2>&1 | tee xcodebuild-archive.log

          XCODE_EXIT=${PIPESTATUS[0]}
          kill $HEARTBEAT_PID || true

          if [ $XCODE_EXIT -ne 0 ]; then
            echo "===== LAST 200 LINES OF XCODE LOG ====="
            tail -n 200 xcodebuild-archive.log
            exit $XCODE_EXIT
          fi

      - name: Upload archive log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-archive-log
          path: xcodebuild-archive.log

      - name: Export IPA
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p build/export
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Validate IPA
        shell: bash
        run: |
          set -euxo pipefail
          xcrun altool \
            --validate-app \
            --type ios \
            --file build/export/App.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA
        shell: bash
        run: |
          set -euxo pipefail
          xcrun altool \
            --upload-app \
            --type ios \
            --file build/export/App.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"