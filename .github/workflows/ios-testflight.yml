name: ios-testflight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      # ---------- App Store Connect API key ----------
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

      # ---------- Fastlane ----------
      FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
      FASTLANE_USERNAME: ${{ secrets.FASTLANE_USER }}

      # ---------- match ----------
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      # ---------- iOS ----------
      IOS_SCHEME: App

      # ---------- Next / Supabase ----------
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ---------- Stripe ----------
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_IDENTITY_WEBHOOK_SECRET: ${{ secrets.STRIPE_IDENTITY_WEBHOOK_SECRET }}

      # ---------- Email ----------
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
      CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}

      # ---------- Push ----------
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}

      # ---------- App URL ----------
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      # Capacitor requires a webDir
      - name: Create placeholder web assets
        run: |
          rm -rf dist
          mkdir -p dist
          cat > dist/index.html <<'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Pinch My Pony</title>
          </head>
          <body></body>
          </html>
          EOF

      - name: Capacitor sync
        run: npx cap sync ios

      # -------------------------------
      # Swift Package Manager caching
      # -------------------------------

      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: |
            ios/App/DerivedData
            ios/App/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/App/App.xcodeproj/project.pbxproj') }}

      - name: Resolve Swift packages
        working-directory: ios/App
        run: |
          set -eux
          mkdir -p DerivedData SourcePackages
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath SourcePackages \
            -derivedDataPath DerivedData

      # -------------------------------
      # Ruby + Fastlane
      # -------------------------------

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure git auth for match
        run: |
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Fastlane bootstrap
        run: bundle exec fastlane ios bootstrap

      - name: Fastlane beta (build + TestFlight)
        run: bundle exec fastlane ios beta