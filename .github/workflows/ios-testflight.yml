name: iOS Signing Bootstrap

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Verify ASC key decodes and parses (no key output)
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -euo pipefail
          echo "$ASC_KEY_P8" | base64 --decode > /tmp/AuthKey.p8
          # Validate key structure without printing it
          openssl pkey -in /tmp/AuthKey.p8 -noout
          echo "ASC_KEY_P8 decoded + openssl parsed OK"

      - name: Configure match git auth
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${MATCH_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Run fastlane bootstrap
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}

          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}

          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

          FASTLANE_DISABLE_COLORS: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_DONT_STORE_PASSWORD: "1"
          SPACESHIP_DEBUG: "1"
        run: |
          bundle exec fastlane ios bootstrap --verbose