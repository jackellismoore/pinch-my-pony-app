name: iOS -> TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run (bootstrap or beta)"
        required: true
        default: "bootstrap"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ensure webDir exists
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body></body>
          </html>
          EOF

      - run: npx cap sync ios

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - run: bundle install

      # ✅ Auth to GitHub WITHOUT embedding token in URL
      - name: Configure git auth for match (http.extraheader)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, base64
          tok = os.environ.get("MATCH_GIT_TOKEN","")
          if not tok or tok.strip() != tok:
            raise SystemExit("MATCH_GIT_TOKEN missing or has leading/trailing whitespace")
          b64 = base64.b64encode(f"x-access-token:{tok}".encode()).decode()
          print(f"::add-mask::{b64}")
          print(b64)
          PY
          B64="$(python3 - <<'PY'
          import os, base64
          tok=os.environ["MATCH_GIT_TOKEN"]
          print(base64.b64encode(f"x-access-token:{tok}".encode()).decode())
          PY
          )"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${B64}"

      - name: Run Fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: bundle exec fastlane ios ${{ github.event.inputs.lane }}
